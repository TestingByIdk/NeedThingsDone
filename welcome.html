<!DOCTYPE html>

</head>
<body>

<div class="progress-bar">

        <div class="progress-fill" style="width:0%;"></div>
    </div>

    <div class="progress-steps">
        <div class="step active">1</div>
        <div class="step">2</div>
        <div class="step">3</div>
        <div class="step">4</div>
        <div class="step">5</div>
        <div class="step">6</div>
        <div class="step">7</div>
        <div class="step">8</div>

</div>

<section class="welcome-container">

    <div class="otto-big">
    <img src="assets/images/otto.png" class="otto-img" alt="Otto">

    <h1>Welcome to NeedThingsDone</h1>  

    <p class="subtitle">
        Hi! I'm Otto.
    </p>

    <p class="description">
        I'll guide you through creating your account and building your profile.

    <div class="welcome-buttons">
  <a href="account-choice.html" class="primary-btn">
    Start With Otto →
  </a>
</div>

</section>

</html>
