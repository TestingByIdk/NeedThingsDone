<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">

  <title>Account Ready - NeedThingsDone</title>
</head>
<body class="auth-body">
<header class="auth-topbar">
  <a class="auth-brand" href="../index.html">
    <img src="../assets/images/otto.png" alt="Otto">
    <span><strong>NeedThings<span>Done</span></strong><small>From need to done.</small></span>
  </a>
  <div class="auth-top-actions">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    <a href="../index.html">Back to site</a>
  </div>
</header>

<main class="auth-shell">
<section class="auth-card auth-form-card auth-center-card">
  <div class="auth-success-icon">✓</div>
  <h1>Your account is ready</h1>
  <p>You are now signed in to the NeedThingsDone frontend demo.</p>
  <div class="auth-account-summary">
    <span>Name</span><strong id="successName">New Member</strong>
    <span>Account type</span><strong id="successRole">Find help</strong>
  </div>
  <a class="auth-primary" href="account-choice.html">Continue</a>
  <a class="auth-secondary" href="../index.html">Return home</a>
</section>

</main>
<script>window.NTD_ASSETS = "../assets/images";</script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
