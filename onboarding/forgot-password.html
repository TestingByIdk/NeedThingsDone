<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">

  <title>Forgot Password - NeedThingsDone</title>
</head>
<body class="auth-body">
<header class="auth-topbar">
  <a class="auth-brand" href="../index.html">
    <img src="../assets/images/otto.png" alt="Otto">
    <span><strong>NeedThings<span>Done</span></strong><small>From need to done.</small></span>
  </a>
  <div class="auth-top-actions">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    <a href="../index.html">Back to site</a>
  </div>
</header>

<main class="auth-shell">
<section class="auth-card auth-form-card">
  <div class="auth-card-heading">
    <div class="auth-icon">🔑</div>
    <h1>Forgot your password?</h1>
    <p>Enter your email and we’ll prepare a reset link.</p>
  </div>
  <div id="authNotice" class="auth-notice" hidden></div>
  <form id="forgotForm" class="auth-form">
    <label>Email address<input id="forgotEmail" type="email" required autocomplete="email" placeholder="you@example.ca"></label>
    <button class="auth-primary" type="submit">Send reset link</button>
  </form>
  <p class="auth-switch"><a href="login.html">← Back to login</a></p>
</section>

</main>
<script>window.NTD_ASSETS = "../assets/images";</script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
