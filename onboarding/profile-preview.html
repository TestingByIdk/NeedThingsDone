<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Profile Preview - NeedThingsDone</title>

  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <main class="ntd-onboarding">

    <div class="onboarding-bg bg-blue"></div>
    <div class="onboarding-bg bg-orange"></div>
    <div class="onboarding-bg bg-green"></div>

    <div class="progress-bar clean-progress">
      <div class="progress-line">
        <div class="progress-fill" style="width: 42%;"></div>
      </div>

      <div class="progress-steps">
        <div class="step done">1</div>
        <div class="step done">2</div>
        <div class="step done">3</div>
        <div class="step active">4</div>
        <div class="step">5</div>
        <div class="step">6</div>
        <div class="step">7</div>
        <div class="step">8</div>
      </div>
    </div>

    <section class="preview-wrap">

  <div class="otto-big">
    <img src="../assets/images/otto.png" class="otto otto-large" alt="Otto">
  </div>

  <p class="otto-text preview-otto" id="previewOttoText">
    Perfect! Let’s confirm what you’re building.
  </p>

  <h1 id="previewHeading">Perfect! You're creating an Individual profile.</h1>

  <p class="onboarding-desc">
    Here’s what Otto will help you set up first.
  </p>

  <div class="preview-card">
    <div class="preview-icon" id="previewIcon">👤</div>

    <div class="preview-content">
      <p class="preview-label">Your profile includes</p>
      <h2 id="previewTitle">Individual</h2>

      <ul id="previewList">
        <li>Reviews</li>
        <li>Skills</li>
        <li>Pricing</li>
        <li>Contact options</li>
      </ul>
    </div>
  </div>

  <div class="preview-actions">
    <a href="choose-profile.html" class="secondary-btn">← Back</a>
    <a href="#" class="primary-btn">Continue →</a>
  </div>

</section>
  </main>

  <script src="../js/profile-preview.js"></script>
</body>
</html>
