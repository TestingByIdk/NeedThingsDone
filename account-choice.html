<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Account Choice - NeedThingsDone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="progress-bar">
  <div class="progress-line">
    <div class="progress-fill" style="width:14%;"></div>
  </div>

  <div class="progress-steps">
    <div class="step done">1</div>
    <div class="step active">2</div>
    <div class="step">3</div>
    <div class="step">4</div>
    <div class="step">5</div>
    <div class="step">6</div>
    <div class="step">7</div>
    <div class="step">8</div>
  </div>
</div>

<section class="welcome-container">
  <div class="otto-big">🐙</div>

  <h1>Do you already have an account?</h1>

  <p class="subtitle">Otto can help either way.</p>

  <p class="description">
    Log in if you already have a NeedThingsDone account. You can add an Individual,
    Shop, or Business profile later from your account.
  </p>

  <div class="welcome-buttons">
    <a href="login.html" class="secondary-btn">Log In</a>
    <a href="signup.html" class="primary-btn">Create Account →</a>
  </div>
</section>

</body>
</html>
