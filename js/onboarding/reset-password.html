<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
(() => {
  try {
    const savedSettings = JSON.parse(localStorage.getItem("ntdAccountSettingsV1") || "null");
    const preference =
      savedSettings?.theme ||
      localStorage.getItem("ntdTheme") ||
      localStorage.getItem("theme") ||
      localStorage.getItem("ntdThemePreference") ||
      "light";
    const dark =
      preference === "dark" ||
      (preference === "system" &&
        window.matchMedia("(prefers-color-scheme: dark)").matches);

    document.documentElement.classList.toggle("dark-mode", dark);
    document.documentElement.dataset.theme = dark ? "dark" : "light";
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.toggle("dark-mode", dark);
    });
  } catch {}
})();
</script>
  <title>Reset Password - NeedThingsDone</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/premium-dark.css">
  <link rel="stylesheet" href="../css/onboarding-audit.css">
</head>
<body class="auth-body">
<header class="auth-topbar">
  <a class="auth-brand" href="../index.html">
    <img src="../assets/images/otto.png" alt="Otto">
    <span><strong>NeedThings<span>Done</span></strong><small>From need to done.</small></span>
  </a>
  <div class="auth-top-actions">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    <a href="../index.html">Back to site</a>
  </div>
</header>
<main class="auth-shell">
<section class="auth-card auth-form-card">
  <div class="auth-card-heading"><div class="auth-icon">🛡️</div><h1>Create a new password</h1><p>This page only works after opening the secure link from your reset email.</p></div>
  <div id="authNotice" class="auth-notice" hidden></div>
  <form id="resetForm" class="auth-form" novalidate>
    <label>New password<div class="auth-password-wrap"><input id="resetPassword" type="password" required minlength="8" autocomplete="new-password"><button type="button" data-toggle-password="resetPassword">Show</button></div></label>
    <label>Confirm password<div class="auth-password-wrap"><input id="confirmPassword" type="password" required minlength="8" autocomplete="new-password"><button type="button" data-toggle-password="confirmPassword">Show</button></div></label>
    <button id="resetSubmit" class="auth-primary" type="submit">Update password</button>
  </form>
  <p class="auth-switch"><a href="login.html">← Back to login</a></p>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../backend/supabase.js"></script>
<script src="../js/script.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
